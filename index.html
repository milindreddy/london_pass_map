<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="description" content="Minimal interactive map of London Pass attractions" />
  <title>London Pass map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    :root {
      --bg:#0e1116; --panel:#151a21; --line:#242b36; --ink:#e6e9ef;
      --muted:#889; --accent:#5b9dff; --home:#f5b301;
    }
    * { box-sizing:border-box; }
    html,body { height:100%; margin:0; font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; overflow:hidden; overscroll-behavior:none; }

    /* --app-h is set from window.innerHeight in JS (reliable mobile viewport height). */
    .app { position:relative; height:100vh; height:100dvh; height:var(--app-h,100vh); display:grid; grid-template-columns:340px 1fr; overflow:hidden; }

    /* Left panel = title + categories + list. Desktop: fixed column. Mobile: slide-in drawer. */
    .panel { display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--line); background:var(--panel); }
    .bar { flex:0 0 auto; padding:14px 14px 10px; border-bottom:1px solid var(--line); }
    .bar-top { display:flex; align-items:center; gap:8px; margin-bottom:11px; }
    .bar h1 { font-size:15px; font-weight:600; margin:0; letter-spacing:-.2px; flex:1; }
    .bar h1 .n { font-size:11px; color:var(--muted); font-weight:400; margin-left:5px; }
    .closeDrawer { display:none; background:none; border:0; color:var(--muted); font-size:22px; line-height:1; padding:2px 6px; cursor:pointer; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { display:inline-flex; align-items:center; gap:6px; font-size:12.5px; padding:6px 11px 6px 9px; border:1px solid var(--line); border-radius:999px; background:transparent; color:#c2c8d2; cursor:pointer; user-select:none; }
    .chip .dot { width:9px; height:9px; border-radius:50%; }
    .chip .n { color:#5f6773; }
    .chip:active { transform:scale(.96); }
    .chip.active { color:#0e1116; font-weight:600; border-color:transparent; }
    .chip.active .n { color:rgba(0,0,0,.5); }

    aside { flex:1 1 auto; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; min-height:0; }
    aside::-webkit-scrollbar { width:8px; }
    aside::-webkit-scrollbar-thumb { background:#2a323e; border-radius:8px; }
    .list { display:flex; flex-direction:column; }
    .card { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
    .card:active { background:#191f27; }
    .card .cdot { width:10px; height:10px; border-radius:50%; margin-top:4px; flex:0 0 auto; }
    .card .body { min-width:0; }
    .card h2 { font-size:13.5px; font-weight:500; margin:0 0 2px; line-height:1.3; }
    .card .sub { font-size:11.5px; color:var(--muted); line-height:1.35; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .empty { padding:24px 14px; color:var(--muted); font-size:12px; text-align:center; }

    main { position:relative; min-width:0; }
    #map { position:absolute; inset:0; background:#0e1116; }
    .mapbtns { position:absolute; right:10px; top:10px; z-index:800; display:flex; gap:6px; }
    .mapbtns button { font:inherit; font-size:12.5px; padding:9px 12px; border:1px solid var(--line); border-radius:9px; background:rgba(21,26,33,.94); color:var(--ink); cursor:pointer; backdrop-filter:blur(4px); }
    .mapbtns .home { background:var(--home); color:#1a1400; border-color:#caa000; font-weight:600; }

    /* Burger + backdrop: mobile only */
    #burger { display:none; position:absolute; top:10px; left:10px; z-index:900; width:44px; height:44px; align-items:center; justify-content:center; border:1px solid var(--line); border-radius:11px; background:rgba(21,26,33,.94); color:var(--ink); cursor:pointer; backdrop-filter:blur(4px); }
    #backdrop { display:none; position:absolute; inset:0; background:rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .25s; z-index:1450; }

    .leaflet-control-zoom { margin-top:60px !important; }   /* clear the burger */
    .leaflet-control-zoom a { background:#151a21 !important; color:#c2c8d2 !important; border-color:var(--line) !important; }
    .leaflet-control-zoom a:hover { background:#20272f !important; }
    .leaflet-control-attribution { background:rgba(14,17,22,.7) !important; color:#5f6773 !important; }
    .leaflet-control-attribution a { color:#889 !important; }
    .pin { background:none; border:none; filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)); }
    .home-badge { width:30px; height:30px; border-radius:50%; background:var(--home); display:flex; align-items:center; justify-content:center; font-size:15px; box-shadow:0 0 0 3px rgba(245,179,1,.3),0 2px 6px rgba(0,0,0,.5); }
    .marker-cluster div { background:rgba(91,157,255,.9) !important; color:#fff !important; font-weight:600; font-family:inherit; }
    .marker-cluster { background:rgba(91,157,255,.25) !important; }
    .leaflet-popup-content-wrapper,.leaflet-popup-tip { background:#151a21; color:var(--ink); border:1px solid var(--line); }
    .leaflet-popup-content-wrapper { border-radius:10px; }
    .leaflet-popup-close-button { color:var(--muted) !important; }
    .popup h3 { font-size:14px; margin:0 0 6px; font-weight:600; }
    .popup .tag { display:inline-block; font-size:10px; padding:2px 7px; border-radius:5px; color:#0e1116; font-weight:600; margin-bottom:6px; }
    .popup p { margin:5px 0; font-size:12px; color:#aab2be; line-height:1.4; }
    .popup a { color:var(--accent); text-decoration:none; }

    @media (max-width: 760px) {
      .app { grid-template-columns:1fr; }        /* map fills everything */
      #burger { display:flex; }
      #backdrop { display:block; }
      .closeDrawer { display:block; }
      .panel {
        position:absolute; top:0; left:0; bottom:0; width:min(86vw,340px); z-index:1500;
        transform:translateX(-100%); transition:transform .26s ease; box-shadow:2px 0 24px rgba(0,0,0,.5);
      }
      .app.drawer-open .panel { transform:translateX(0); }
      .app.drawer-open #backdrop { opacity:1; pointer-events:auto; }
      .bar h1 { font-size:16px; }
      .leaflet-control-zoom { margin-top:64px !important; margin-left:8px !important; }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="panel" id="panel">
    <header class="bar">
      <div class="bar-top">
        <h1>London Pass map <span class="n" id="count"></span></h1>
        <button class="closeDrawer" id="closeDrawer" aria-label="Close">&times;</button>
      </div>
      <div class="chips" id="legend"></div>
    </header>
    <aside><div id="list" class="list"></div></aside>
  </div>
  <main>
    <div id="map"></div>
    <button id="burger" aria-label="Open list">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="mapbtns">
      <button id="fitAll">Fit all</button>
      <button class="home" id="goHome">🏠 Stay</button>
    </div>
  </main>
  <div id="backdrop"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(() => {
  const HOME = { lat:51.6512096, lon:-0.1971085, name:'My Airbnb', address:'7D High St, Barnet EN5 5UE' };
  const CATEGORY_COLORS = {
    'Food & drink':'#22c55e','Museum':'#5b9dff','Tour':'#f97316','Landmark':'#ef4444',
    'Entertainment':'#a855f7','Experience':'#06b6d4','Day trip':'#b06a2c','Sports':'#3b5bdb',
    'Cruise':'#38bdf8','Royal':'#eab308','Garden':'#84cc16','Exhibition':'#ec4899',
    'Service':'#94a3b8','Theme park':'#d946ef','Wellness':'#14b8a6','Zoo & wildlife':'#f59e0b',
  };
  const catColor = c => CATEGORY_COLORS[c] || '#94a3b8';

  const app = document.getElementById('app');
  const map = L.map('map', { zoomControl:true }).setView([51.5072,-0.1276], 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd', attribution:'© OpenStreetMap © CARTO' }).addTo(map);
  const cluster = L.markerClusterGroup({ showCoverageOnHover:false, maxClusterRadius:44 });
  map.addLayer(cluster);

  const listEl = document.getElementById('list');
  const legendEl = document.getElementById('legend');
  const countEl = document.getElementById('count');
  const markers = new Map(), coords = new Map();
  let all = [], rendered = [], activeCat = '';
  const cacheKey = 'london-pass-map-nominatim-v1';
  let geocodeCache = {};
  try { geocodeCache = JSON.parse(localStorage.getItem(cacheKey) || '{}'); } catch(e) {}
  const isMobile = () => window.matchMedia('(max-width: 760px)').matches;

  const escapeHtml = v => String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const googleMapsUrl = q => 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q || 'London');
  const officialUrl = a => a.official_url || ('https://www.google.com/search?q=' + encodeURIComponent(a.name + ' site:londonpass.com'));

  const iconCache = {};
  function iconFor(cat) {
    const color = catColor(cat);
    if (iconCache[color]) return iconCache[color];
    const html = `<svg width="24" height="34" viewBox="0 0 27 38" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 0C6 0 0 6 0 13.5 0 23.6 13.5 38 13.5 38S27 23.6 27 13.5C27 6 21 0 13.5 0z" fill="${color}"/><circle cx="13.5" cy="13.3" r="5" fill="#0e1116" fill-opacity=".85"/></svg>`;
    return (iconCache[color] = L.divIcon({ html, className:'pin', iconSize:[24,34], iconAnchor:[12,34], popupAnchor:[0,-30] }));
  }

  function popup(a) {
    const color = catColor(a.category);
    const loc = a.location_query ? escapeHtml(a.location_query) : 'No fixed physical venue.';
    return `<div class="popup"><h3>${escapeHtml(a.name)}</h3>
      <span class="tag" style="background:${color}">${escapeHtml(a.category)}</span>
      <p>${loc}</p>
      <p><a href="${googleMapsUrl(a.location_query || a.name)}" target="_blank" rel="noopener">Directions ↗</a> ·
      <a href="${officialUrl(a)}" target="_blank" rel="noopener">${a.official_slug ? 'Official page ↗' : 'London Pass ↗'}</a></p></div>`;
  }

  const matches = a => (!activeCat || a.category === activeCat);

  function addHome() {
    const icon = L.divIcon({ className:'pin', html:`<div class="home-badge">🏠</div>`, iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-14] });
    L.marker([HOME.lat, HOME.lon], { icon, zIndexOffset:1000 })
      .bindPopup(`<div class="popup"><h3>🏠 ${escapeHtml(HOME.name)}</h3><span class="tag" style="background:${'#f5b301'}">Your stay</span><p>${escapeHtml(HOME.address)}</p><p><a href="${googleMapsUrl(HOME.address)}" target="_blank" rel="noopener">Directions ↗</a></p></div>`).addTo(map);
  }

  function buildLegend() {
    const counts = {};
    for (const a of all) counts[a.category] = (counts[a.category]||0) + 1;
    const cats = Object.keys(counts).sort((x,y) => counts[y]-counts[x] || x.localeCompare(y));
    const allChip = `<span class="chip" data-cat="" style="--c:#5b9dff"><span class="dot" style="background:#5b9dff"></span>All <span class="n">${all.length}</span></span>`;
    legendEl.innerHTML = allChip + cats.map(c => `<span class="chip" data-cat="${escapeHtml(c)}" style="--c:${catColor(c)}"><span class="dot" style="background:${catColor(c)}"></span>${escapeHtml(c)} <span class="n">${counts[c]}</span></span>`).join('');
    legendEl.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => {
      activeCat = chip.dataset.cat;   // click a category to show only those; All resets
      rebuild();
      fitAll();
    }));
  }
  function syncChips() {
    legendEl.querySelectorAll('.chip').forEach(chip => {
      const on = chip.dataset.cat === activeCat;
      chip.classList.toggle('active', on);
      chip.style.background = on ? chip.style.getPropertyValue('--c') : '';
    });
  }

  function rebuild() {
    rendered = all.filter(matches);
    cluster.clearLayers();
    for (const a of rendered) { const m = markers.get(a.id); if (m) cluster.addLayer(m); }
    countEl.textContent = rendered.length + (activeCat ? ' · ' + activeCat : '');
    listEl.innerHTML = rendered.map(a => `<article class="card" data-id="${a.id}"><span class="cdot" style="background:${catColor(a.category)}"></span><div class="body"><h2>${escapeHtml(a.name)}</h2><div class="sub">${escapeHtml(a.category)} · ${escapeHtml(a.location_query || 'No fixed venue')}</div></div></article>`).join('') || '<div class="empty">No attractions match.</div>';
    listEl.querySelectorAll('.card').forEach(card => card.addEventListener('click', () => {
      const id = Number(card.dataset.id), m = markers.get(id), a = all.find(x=>x.id===id);
      if (m) { closeDrawer(); map.setView(m.getLatLng(), Math.max(map.getZoom(), 15)); m.openPopup(); }
      else if (a) alert(`${a.name}\n\n${a.notes||''}`);
    }));
    syncChips();
  }

  function addMarker(a, lat, lon) {
    const m = L.marker([lat,lon], { title:a.name, icon:iconFor(a.category) }).bindPopup(popup(a), { maxWidth:280 });
    markers.set(a.id,m); coords.set(a.id,[lat,lon]);
    if (matches(a)) cluster.addLayer(m);
  }
  const sleep = ms => new Promise(r=>setTimeout(r,ms));

  function fitAll() {
    const pts = rendered.map(a => coords.get(a.id)).filter(Boolean);
    if (!activeCat) pts.push([HOME.lat, HOME.lon]);
    if (pts.length) map.fitBounds(pts, { padding:[40,40], maxZoom:15 });
  }
  function plotBaked() {
    for (const a of all) if (Number.isFinite(a.lat) && Number.isFinite(a.lon) && !markers.has(a.id)) addMarker(a, a.lat, a.lon);
    rebuild(); fitAll();
  }
  async function resolveMarkers() {
    plotBaked();
    const missing = all.filter(a => a.location_query && !markers.has(a.id));
    for (const a of missing) {
      const cached = geocodeCache[a.location_query];
      if (cached && Number.isFinite(cached.lat) && Number.isFinite(cached.lon)) { addMarker(a,cached.lat,cached.lon); rebuild(); continue; }
      try {
        const res = await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=en&q=' + encodeURIComponent(a.location_query), { headers:{'Accept':'application/json'} });
        const data = await res.json();
        if (data && data[0]) { const loc = {lat:Number(data[0].lat), lon:Number(data[0].lon)}; geocodeCache[a.location_query]=loc; localStorage.setItem(cacheKey, JSON.stringify(geocodeCache)); addMarker(a,loc.lat,loc.lon); }
      } catch (err) { console.warn('geocode failed', a.name); }
      rebuild();
      await sleep(1100);
    }
  }

  // Drawer (mobile)
  function openDrawer() { app.classList.add('drawer-open'); }
  function closeDrawer() { app.classList.remove('drawer-open'); }
  document.getElementById('burger').addEventListener('click', openDrawer);
  document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
  document.getElementById('backdrop').addEventListener('click', closeDrawer);

  document.getElementById('fitAll').addEventListener('click', fitAll);
  document.getElementById('goHome').addEventListener('click', () => { closeDrawer(); map.setView([HOME.lat, HOME.lon], 15); });

  // Keep the app locked to the real visible viewport height and the map sized.
  function syncHeight() {
    document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
    map.invalidateSize();
  }
  window.addEventListener('resize', syncHeight);
  window.addEventListener('orientationchange', () => setTimeout(syncHeight, 120));
  syncHeight();

  addHome();
  fetch('./data/attractions.json').then(r=>r.json()).then(data => {
    all = data; countEl.textContent = all.length;
    buildLegend(); rebuild(); resolveMarkers();
    setTimeout(() => { map.invalidateSize(); fitAll(); }, 120);
  }).catch(err => { listEl.innerHTML = '<div class="empty">Could not load data. Serve this folder with a local web server.</div>'; console.error(err); });
})();
</script>
</body>
</html>
